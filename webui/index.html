<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Orkestra</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">ORKESTRA</div>
    <div class="topbarActions">
      <button type="button" id="commandBtn" class="iconButton tooltipTarget" aria-label="Open command menu" data-tooltip="Open command menu">⌘K</button>
      <button type="button" id="settingsBtn" class="iconButton tooltipTarget" aria-label="Open settings" data-tooltip="Open settings">⚙</button>
      <button type="button" id="helpBtn" class="iconButton tooltipTarget" aria-label="Open help" data-tooltip="Open help">?</button>
    </div>
    <div id="topbarPopover" class="topbarPopover" hidden></div>
  </header>

  <main class="shell">
    <aside class="sidebar">
      <div class="sidebarHead">
        <h1>Entities</h1>
        <input id="entitySearch" class="searchInput" type="search" placeholder="Search">
      </div>
      <nav id="entityTree" class="entityTree" aria-label="Entities"></nav>
    </aside>

    <section class="workspace">
      <section class="controlBand">
        <div class="scopeRow">
          <div>
            <div class="eyebrow">Scope</div>
            <div class="segmented" role="group" aria-label="Scope">
              <button type="button" class="segment active" data-scope="global">Global</button>
              <button type="button" class="segment" data-scope="project">Project</button>
            </div>
          </div>
          <label class="projectSelector">
            <span>Project</span>
            <input id="projectInput" type="text" readonly>
          </label>
        </div>

        <div class="agentRow">
          <div class="eyebrow">Agents</div>
          <div id="agentMatrix" class="agentMatrix"></div>
        </div>

        <div class="domainRow">
          <div class="eyebrow">Domains</div>
          <div id="domainFilters" class="domainFilters"></div>
        </div>
      </section>

      <section class="entityBody">
        <article class="entityInfo">
          <div class="entityTitleRow">
            <div>
              <div id="entityId" class="entityId">Select an entity</div>
              <h2 id="entityName">No entity selected</h2>
            </div>
          </div>
          <p id="entityDescription" class="description">Choose an entity from the sidebar.</p>
          <dl class="metaGrid">
            <div>
              <dt>Version</dt>
              <dd id="entityVersion">-</dd>
            </div>
            <div>
              <dt>Author</dt>
              <dd id="entityAuthor">-</dd>
            </div>
            <div>
              <dt>Compatibility</dt>
              <dd id="entityAgents">-</dd>
            </div>
            <div>
              <dt>Domain</dt>
              <dd id="entityDomain">-</dd>
            </div>
            <div>
              <dt>Type</dt>
              <dd id="entityType">-</dd>
            </div>
            <div>
              <dt>Conflicts</dt>
              <dd id="entityConflicts">-</dd>
            </div>
            <div>
              <dt>Tags</dt>
              <dd id="entityTags">-</dd>
            </div>
          </dl>
        </article>

        <article class="previewPane">
          <div class="paneHead">
            <h2>Preview</h2>
            <div class="previewPaths" aria-label="Entity paths">
              <div><span>Source</span><code id="sourcePathText">-</code></div>
              <div><span>Installed</span><code id="installedPathText">Not installed in current scope</code></div>
            </div>
          </div>
          <pre id="entityPreview" class="markdownPreview"># Preview</pre>
        </article>
      </section>
    </section>
  </main>

  <div id="floatingTooltip" class="floatingTooltip" hidden></div>
  <script src="/app.js"></script>
</body>
</html>
