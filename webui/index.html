<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Orkestra Template Manager</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="topbarSection topbarLeft">
      <h1>Orkestra</h1>
    </div>
    <div class="topbarSection topbarCenter">
      <span id="projectPath" class="projectPath"></span>
    </div>
    <div class="topbarSection topbarRight">
      <div id="agentFilters" class="agentFilters"></div>
    </div>
  </header>

  <main class="layout">
    <section class="topRow">
      <section class="panel filesPanel">
        <div class="filesGrid" id="filesGrid">
          <section class="fileColumn sourceColumn" id="sourceFileColumn">
            <div class="columnHead">
              <h2>A: Source (Orkestra)</h2>
            </div>
            <div id="sourceColumn" class="sourceContent"></div>
          </section>

          <section class="fileColumn">
            <div class="columnHead">
              <h2>B: Global</h2>
              <div class="columnHeadControls" id="globalHeaderControls"></div>
            </div>
            <div id="globalColumn"></div>
          </section>

          <section class="fileColumn">
            <div class="columnHead">
              <h2>C: Project</h2>
              <div class="columnHeadControls" id="renderedHeaderControls"></div>
            </div>
            <div id="renderedColumn"></div>
          </section>
        </div>
      </section>
    </section>

    <section class="panel previewPanel">
      <div class="previewGrid" id="previewGrid">
        <section class="previewCol" id="leftCol">
          <div class="previewColHead">
            <span id="leftMeta">Preview: -</span>
            <label class="compareCheckLabel" id="compareCheckLabel" hidden>
              <input type="checkbox" id="compareCheckbox"> Compare
            </label>
          </div>
          <textarea id="leftEditor" spellcheck="false" placeholder="Select a file pill above..."></textarea>
        </section>

        <section class="previewCol" id="rightCol" hidden>
          <div class="previewColHead">
            <span id="rightMeta">Compare: -</span>
          </div>
          <textarea id="rightEditor" spellcheck="false" placeholder="Click any file to compare..."></textarea>
        </section>

        <div id="diffVisual" class="diffVisual" hidden></div>
      </div>
    </section>
  </main>

  <div class="modalBackdrop" id="confirmModal" hidden>
    <div class="modalCard" role="dialog" aria-modal="true" aria-labelledby="confirmModalTitle" aria-describedby="confirmModalBody">
      <div class="modalHead">
        <h2 id="confirmModalTitle">Confirm Apply</h2>
      </div>
      <div class="modalBody" id="confirmModalBody"></div>
      <div class="modalActions">
        <button type="button" class="modalBtn modalBtnSecondary" id="confirmModalCancel">Cancel</button>
        <button type="button" class="modalBtn modalBtnPrimary" id="confirmModalConfirm">Apply</button>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
