id: hooks.check-secrets
name: Check Secrets
category: hook
version: 0.1.0
author: orkestra-core
description: >
  Pre-commit guard that blocks staged secret-looking values.
compatibility:
  agents: [claude, codex, copilot, cursor, cline, aider]
  scopes: [project]
conflicts_with: []
requires: []
tags: [git, pre-commit, security]
content: |
  # Check Secrets Hook

  - Event: `pre-commit`.
  - Scan staged changes for API keys, passwords, access tokens, and private keys.
  - Block commits when likely secrets are found.
  - Move secret values to environment variables before retrying.
