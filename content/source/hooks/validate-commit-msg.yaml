id: hooks.validate-commit-msg
name: Validate Commit Message
category: hook
version: 0.1.0
author: orkestra-core
description: >
  Commit message hook for keeping history readable.
compatibility:
  agents: [claude, codex, copilot, cursor, cline, aider]
  scopes: [project]
conflicts_with: []
requires: []
tags: [git, commit-msg, workflow]
content: |
  # Validate Commit Message Hook

  - Event: `commit-msg`.
  - Reject empty or malformed commit messages.
  - Prefer concise imperative messages.
  - Keep history useful for humans and automation.
