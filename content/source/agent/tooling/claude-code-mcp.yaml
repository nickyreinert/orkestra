content: |
  # Agent MCP Integrations

  - Use the active agent's standard MCP configuration for external tools.
  - Common servers include GitHub, Sentry, Postgres, and Obsidian.
  - Configure per project for project-level integration definitions.
  - Check the agent's active MCP server list before relying on an integration.
  - Install only the MCPs that are needed; too many tools increase context cost.
  - Treat MCP definitions as loaded context.
