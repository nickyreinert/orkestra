description: >
  Guidance for delegating bounded work to isolated coding agents.
compatibility:
  agents: [claude, codex, copilot, cursor, cline, aider]
  scopes: [global, project]
conflicts_with: []
requires: []
tags: [agents, subagents, review]
content: |
  # Agent Delegation

  - Store reusable subagent definitions where the active agent expects them.
  - Use subagents for complex tasks that should keep the main session clean.
  - Define the role, task boundary, tools, and expected output explicitly.
  - Read-only tools are useful for review agents.
  - Chain agents for multi-stage tasks when needed.
  - Use Git worktrees for isolation.
