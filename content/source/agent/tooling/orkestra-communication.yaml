content: |
  # Orkestra Communication Skill

  - Use Orkestra MCP tools for status, source listing, source reads, updates, rendering, and diffs.
  - Prefer source mode for edits.
  - Treat rendered mode as read-only observability.
  - After source updates, run `orkestra_render_project`.
  - If a project is not initialized, initialize it before rendering.
  - For user-facing changes, show a source-vs-rendered diff.
