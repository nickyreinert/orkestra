domain: guidance
type: markdown
executable: false
version: 0.1.0
author: orkestra-core
description: >
  Private, local preferences that tune coding-agent behavior for one user.
compatibility:
  agents: [claude, codex, copilot, cursor, cline, aider]
  scopes: [global, project]
conflicts_with: []
requires: []
tags: [agents, local, personal]
content: |
  # Personal Agent Preferences

  - Use the active agent's local instruction file for private preferences and personal habits.
  - Keep personal instruction files git-ignored when they live in a project repo.
  - Paste reviewer comments and convert recurring feedback into personal rules.
  - Separate team project feedback from personal habits.
  - Prune rules regularly to avoid bloat.
