content: |
  # Agent Operating Principles

  - Delegate bounded tasks to subagents when the active agent supports them.
  - Give the agent a way to verify its own work with tests, command output, or reproducible checks.
  - Never accept a successful command as the same thing as evidence.
  - Put computing instructions in evergreen Markdown where they can be reused.
  - Explore the existing system before planning and implementation.
