content: |
  # Claude Code Operating Premises

  - Delegate small tasks to subagents with a brief and let them run autonomously.
  - Give Claude a way to verify its own work with tests, command output, or reproducible checks.
  - Never accept a successful command as the same thing as evidence.
  - Put computing instructions in evergreen Markdown where they can be reused.
  - Explore, then plan, then code. Do not code first.
