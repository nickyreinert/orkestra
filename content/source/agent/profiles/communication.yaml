executable: false
version: 0.1.0
author: orkestra-core
description: >
  Keeps agent updates short, direct, and verification-aware.
compatibility:
  agents: [claude, codex, copilot, cursor, cline, aider]
  scopes: [global, project]
conflicts_with: []
requires: []
tags: [communication, tone, brevity]
content: |
  # Concise Communication

  - Use English in code, comments, commit messages, and docs.
  - Be concise, direct, and honest.
  - Use one short preamble before routine tool work.
  - Do not use celebratory language or emojis.
  - Do not claim work is done or bug-free without verification.
  - When blocked after repeated attempts, ask for an alternative approach.
