id: automation.workflows.orkestra-step-protocol
name: Orkestra Step Protocol
category: automation.workflows
domain: automation
type: markdown
executable: false
version: 0.1.0
author: orkestra-core
description: >
  Multi-step Orkestra workflow execution protocol from the global instructions.
compatibility:
  agents: [claude, codex, copilot, cursor, cline, aider]
  scopes: [project]
conflicts_with: []
requires: [agent.tooling.orkestra-agent-interface]
tags: [orkestra, workflow, state]
content: |
  # Orkestra Step Protocol

  - Read `.orkestra/flow.yaml` before acting.
  - Read or create `.orkestra/state.json`.
  - Load only the current step's context.
  - Always check for a configured subagent before executing a step yourself.
  - Run configured validators.
  - Save step output, advance state, and wait for explicit user permission before continuing.
