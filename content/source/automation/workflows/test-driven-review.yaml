content: |
  # Test Driven Review

  - Write or plan tests alongside implementation.
  - Use `pytest` when the project is Python-based.
  - Mirror source structure in `tests/`.
  - Test public functions and important integration paths.
  - Mock external APIs and heavy dependencies.
  - Run the relevant test command before handing work off.
