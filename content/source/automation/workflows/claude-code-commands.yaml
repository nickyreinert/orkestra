conflicts_with: []
requires: []
tags: [agents, commands, productivity]
content: |
  # Agent Session Commands

  - Use the active agent's session analytics when available.
  - Compact or summarize long sessions before context becomes unreliable.
  - Start a fresh session when stale context outweighs continuity.
  - Use checkpoints or version control for recoverable changes.
  - Set a verifiable completion condition for substantial work.
  - Use `/batch` for multiple file changes.
  - Use `/loop` to iterate until a condition is met.
  - Use `/fork` and `/teleport` for context branching and navigation.
