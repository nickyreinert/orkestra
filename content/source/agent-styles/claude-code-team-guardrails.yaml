tags: [claude-code, claude-md, guardrails]
content: |
  # Claude Code Team Guardrails

  - Keep `CLAUDE.md` concise and committed to the repo.
  - Use it for team guardrails that should load at every session start.
  - Keep short focus rules and avoid verbose prose.
  - Include development workflow, build/test/run commands, code style conventions, architecture overview, and recurring mistakes.
  - Let Claude append rules for itself after errors when that convention is useful.
