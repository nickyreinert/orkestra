content: |
  # Orkestra Generated File Contract

  - Rendered targets carry an `orkestra:generated` marker.
  - Edit sources, not generated target files.
  - Run `orkestra render` after source changes.
  - Use `.orkestra/manifest.yaml` to detect active sources and drift.
  - Never delete `.orkestra/manifest.yaml`; it is the project contract.
  - When source vs. generated ownership is unclear, ask before editing.
