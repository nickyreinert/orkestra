content: |
  # Security Baseline

  - Do not commit credentials, tokens, private keys, or personal data.
  - Validate and normalize external input at trust boundaries.
  - Keep authorization checks close to protected operations.
  - Prefer maintained dependencies and remove unused packages.
  - Call out security assumptions explicitly during review.
