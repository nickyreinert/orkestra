content: |
  # Plan Code Review Loop

  - Analyze requirements before implementation.
  - Draft architecture and interfaces.
  - Implement core logic before wiring UI or CLI entrypoints.
  - Run static analysis and tests.
  - Polish documentation and error messages after behavior is verified.
