category: workflow
version: 0.1.0
author: orkestra-core
description: >
  Standard planning, coding, and review progression used by the templates.
compatibility:
  agents: [claude, codex, copilot, cursor, cline, aider]
  scopes: [project]
conflicts_with: []
requires: []
