content: |
  # Claude Code Subagents

  - Store subagents under `.claude/agents/<agent>.md`.
  - Use subagents for complex tasks that should keep the main session clean.
  - Define `name`, `description`, `tools`, and `model` in frontmatter.
  - Read-only tools are useful for review agents.
  - Chain agents for multi-stage tasks when needed.
  - Use Git worktrees for isolation.
