content: |
  # Python Type Hints

  - Add type hints to public functions and important internal boundaries.
  - Keep data shapes explicit instead of probing dynamically.
  - Run `mypy src/` when the project is configured for it.
  - Prefer typed return values over implicit `None` paths.
