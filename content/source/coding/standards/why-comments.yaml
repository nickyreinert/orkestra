tags: [comments, readability]
content: |
  # Why Comments Only

  - Use comments to explain why code exists or why a tradeoff was chosen.
  - Do not comment obvious code behavior.
  - Keep comments current when changing the surrounding code.
  - Prefer clear names and structure over explanatory comments.
