content: |
  # Hot Path Performance

  - Minimize allocations in hot paths.
  - Avoid unnecessary string slicing.
  - Prefer `str.find()` for scanning when regular expressions are not needed.
  - Reuse buffers where it is safe.
  - Infer state from data structures rather than duplicating flags.
