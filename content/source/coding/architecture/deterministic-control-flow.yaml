content: |
  # Deterministic Control Flow

  - Do not use exceptions for normal branching in hot paths.
  - Avoid `hasattr`, `getattr`, and `delattr` when deterministic structures are available.
  - Use explicit data structures and clear state transitions.
  - Prefer predictable conditionals over reflective probing.
