content: |
  # Frontend Accessibility

  - Use semantic tags such as `header`, `main`, `footer`, `article`, and `section`.
  - Add ARIA labels when icons or controls are not self-explanatory.
  - Provide alt text for meaningful images.
  - Keep keyboard interaction available for custom controls.
